name: Release Artifact

on:
  workflow_run:
    workflows: ["Submodule build"] # Must match the 'name:' of your first file
    types:
      - completed

jobs:
  upload:
    runs-on: ubuntu-latest
    # Only run if the build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip for Release
        run: zip -r submodule-release.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Using the ID of the workflow run as a unique tag
          tag_name: build-${{ github.event.workflow_run.id }}
          name: "Build from PR Check"
          files: submodule-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}